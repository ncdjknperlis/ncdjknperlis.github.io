            {

            {

            },
            {
                id: 6, kategori: "B",

            },

        // --- ENJIN GENERATOR & PENAPIS ACCORDION FAQ ---
        function janaFaqAccordion(senaraiFaq) {
            const container = document.getElementById('faqContainer');
            container.innerHTML = ""; 

            if (senaraiFaq.length === 0) {
                container.innerHTML = `<div class="p-8 text-center text-xs text-gray-400 font-light">Tiada soalan lazim ditemui untuk kategori ini.</div>`;
                return;
            }

            senaraiFaq.forEach((item, indeks) => {
                const innerHtmlBlock = `
                    <div class="animasi-faq border rounded-xl bg-white shadow-xs overflow-hidden dinamik-bg-kad dinamik-border" style="animation-delay: ${indeks * 0.03}s">
                        <button onclick="toggleFaq(this)" class="w-full px-5 py-4 text-left flex justify-between items-center focus:outline-none select-none">
                            <span class="text-xs md:text-sm font-bold text-[#101e33] pr-4 leading-snug dinamik-teks-tajuk">Q${item.id}: ${item.q}</span>
                            <span class="text-[10px] text-gray-400 transition-transform duration-300 transform dinamik-teks-sub">▼</span>
                        </button>
                        <div class="faq-content bg-gray-50/40 border-t border-transparent transition-all duration-300">
                            <p class="p-5 text-xs text-gray-600 leading-relaxed font-light dinamik-teks-biasa">${item.a}</p>
                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', innerHtmlBlock);
            });
        }

        function saringKategori(kat) {
            const dataDitapis = kat === 'semua' ? masterFaqData : masterFaqData.filter(item => item.kategori === kat);
            janaFaqAccordion(dataDitapis);

            const semuaButang = document.querySelectorAll('aside button');
            semuaButang.forEach(btn => {
                btn.className = "w-full text-left px-3 py-2 rounded-xl text-xs font-semibold hover:bg-gray-100 transition-colors dinamik-teks-biasa flex-shrink-0";
            });

            const butangAktif = document.getElementById(`btn-${kat}`);
            if (butangAktif) {
                butangAktif.className = "w-full text-left px-3 py-2 rounded-xl text-xs font-bold bg-[#101e33] text-white shadow-xs flex-shrink-0 transition-colors";
            }
        }

        function toggleFaq(button) {
            const content = button.nextElementSibling;
            const arrow = button.querySelector('span:last-child');
            if (content.style.maxHeight && content.style.maxHeight !== "0px") {
                content.style.maxHeight = "0px";
                arrow.style.transform = "rotate(0deg)";
                content.style.borderColor = "transparent";
            } else {
                document.querySelectorAll('.faq-content').forEach(el => {
                    el.style.maxHeight = "0px";
                    el.previousElementSibling.querySelector('span:last-child').style.transform = "rotate(0deg)";
                    el.style.borderColor = "transparent";
                });
                content.style.maxHeight = content.scrollHeight + "px";
                arrow.style.transform = "rotate(180deg)";
                content.style.borderColor = "var(--border-warna)";
            }
        }

        // --- LOGIK SWAP TEMA GLOBAL PORTAL ---
        function tukarTemaManual(tema) {
            document.documentElement.setAttribute('data-theme', tema);
            localStorage.setItem('pilihanTemaNCD_Global', tema);
            const selectBox = document.getElementById('themeSelect');
            if(selectBox) selectBox.value = tema;
        }

        window.addEventListener('DOMContentLoaded', () => {
            tukarTemaManual(localStorage.getItem('pilihanTemaNCD_Global') || 'default');
            saringKategori('semua');
        });
    </script>
