        // --- ENJIN ASYNC COMPONENT LOADING ---
        async function muatKomponenGlobal() {
            try {
                const resH = await fetch('components/header.html');
                document.getElementById('global-header').innerHTML = await resH.text();
                const resF = await fetch('components/footer.html');
                document.getElementById('global-footer').innerHTML = await resF.text();

                // Highlight Tab FAQ
                const el = document.getElementById('nav-faq');
                if(el) el.className = "px-3 py-1 rounded-lg text-[11px] md:text-xs font-bold bg-white text-black shadow-xs dinamik-bg-kad dinamik-teks-tajuk";
                
                tukarTemaManual(localStorage.getItem('pilihanTemaNCD_Global') || 'default');
            } catch (e) { console.error("Gagal load modular components:", e); }
        }

        // --- ACCORDION VIEW ENGINE ---
        function janaFaqAccordion(senaraiFaq) {
            const container = document.getElementById('faqContainer');
            container.innerHTML = ""; 

            if (senaraiFaq.length === 0) {
                container.innerHTML = `<div class="p-8 text-center text-xs text-gray-400 font-light">Tiada soalan lazim ditemui.</div>`;
                return;
            }

            senaraiFaq.forEach((item, indeks) => {
                const innerHtmlBlock = `
                    <div class="animasi-ios border rounded-xl bg-white shadow-xs overflow-hidden dinamik-bg-kad dinamik-border" style="animation-delay: ${indeks * 0.02}s">
                        <button onclick="toggleFaq(this)" class="w-full px-5 py-4 text-left flex justify-between items-center focus:outline-none select-none">
                            <span class="text-xs md:text-sm font-bold text-[#101e33] pr-4 leading-snug dinamik-teks-tajuk">Q${item.id}: ${item.q}</span>
                            <span class="text-[10px] text-gray-400 transition-transform duration-300 transform dinamik-teks-sub">▼</span>
                        </button>
                        <div class="faq-content bg-gray-50/40 border-t border-transparent transition-all duration-300 max-h-0 overflow-hidden">
                            <p class="p-5 text-xs text-gray-600 leading-relaxed font-light dinamik-teks-biasa">${item.a}</p>
                        </div>
                    </div>`;
                container.insertAdjacentHTML('beforeend', innerHtmlBlock);
            });
        }

        function saringKategori(kat) {
            const dataDitapis = kat === 'semua' ? masterFaqData : masterFaqData.filter(item => item.kategori === kat);
            janaFaqAccordion(dataDitapis);

            const semuaButang = document.querySelectorAll('aside button');
            semuaButang.forEach(btn => { btn.className = "w-full text-left px-3 py-2 rounded-xl text-xs font-semibold hover:bg-gray-100 transition-colors dinamik-teks-biasa flex-shrink-0"; });

            const butangAktif = document.getElementById(`btn-${kat}`);
            if (butangAktif) { butangAktif.className = "w-full text-left px-3 py-2 rounded-xl text-xs font-bold bg-[#101e33] text-white shadow-xs flex-shrink-0 transition-colors"; }
        }

        function toggleFaq(button) {
            const content = button.nextElementSibling;
            const arrow = button.querySelector('span:last-child');
            if (content.style.maxHeight && content.style.maxHeight !== "0px") {
                content.style.maxHeight = "0px"; arrow.style.transform = "rotate(0deg)";
            } else {
                document.querySelectorAll('.faq-content').forEach(el => { el.style.maxHeight = "0px"; el.previousElementSibling.querySelector('span:last-child').style.transform = "rotate(0deg)"; });
                content.style.maxHeight = content.scrollHeight + "px"; arrow.style.transform = "rotate(180deg)";
            }
        }

        function tukarTemaManual(tema) { document.documentElement.setAttribute('data-theme', tema); localStorage.setItem('pilihanTemaNCD_Global', tema); const sb = document.getElementById('themeSelect'); if(sb) sb.value = tema; }

        window.addEventListener('DOMContentLoaded', () => {
            muatKomponenGlobal();
            saringKategori('semua');
        });
    </script>
